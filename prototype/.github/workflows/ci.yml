name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov
    
    - name: Run linting
      run: |
        pip install flake8
        flake8 src/ config/ --count --select=E9,F63,F7,F82 --show-source --statistics || true
        flake8 tests/ --count --select=E9,F63,F7,F82 --show-source --statistics || true
    
    - name: Run tests with pytest
      env:
        VIDEOSDK_AUTH_TOKEN: ${{ secrets.VIDEOSDK_AUTH_TOKEN }}
        GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        SARVAM_API_KEY: ${{ secrets.SARVAM_API_KEY }}
        TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
      run: |
        pytest tests/ -v --cov=src --cov=config --cov-report=xml --cov-report=html
    
    - name: Upload coverage to Codecov
      if: success()
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        name: arya-prototype
    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: htmlcov/
    
    - name: Generate test summary
      if: always()
      run: |
        echo "## Test Summary" >> $GITHUB_STEP_SUMMARY
        echo "Tests completed. Check artifacts for detailed coverage report."


  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Verify requirements.txt
      run: |
        pip install -r requirements.txt --dry-run
    
    - name: Check Python version
      run: python --version
    
    - name: Verify project structure
      run: |
        ls -la config/
        ls -la src/
        ls -la tests/


  security-scan:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install safety
      run: pip install safety
    
    - name: Run security scan
      run: |
        pip install -r requirements.txt
        safety check || true
    
    - name: Check for secrets
      run: |
        pip install detect-secrets
        echo "Note: Add pre-commit hooks for secrets detection in production"


  notify:
    runs-on: ubuntu-latest
    needs: test
    if: always()
    
    steps:
    - name: Create status summary
      run: |
        echo "## CI/CD Pipeline Status" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Test Results" >> $GITHUB_STEP_SUMMARY
        if [ "${{ needs.test.result }}" == "success" ]; then
          echo "✅ Tests passed" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ Tests failed" >> $GITHUB_STEP_SUMMARY
        fi